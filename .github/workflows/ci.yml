name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (mvn test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          # Writes ~/.m2/settings.xml with the github-csnx server (matches the
          # <repositories> id) so Maven can pull the engine from GitHub Packages.
          server-id: github-csnx
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - name: mvnw test
        working-directory: backend
        run: ./mvnw -B -ntp test
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GH_PACKAGES_TOKEN }}

  frontend:
    name: frontend (typecheck + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
        env:
          # Pulls @alessiohchain/csnx-engine from GitHub Packages (see .npmrc).
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      - name: Typecheck + build
        working-directory: frontend
        run: npm run build
    # NOTE: no full-stack e2e here — it needs the platform IdP stack, which isn't
    # available in single-repo CI. Run it locally if/when demo grows e2e specs.
