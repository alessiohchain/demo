spring:
  application:
    name: demo-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
    username: ${DB_USER:demo}
    password: ${DB_PASSWORD:demo}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.lob.non_contextual_creation: true
        # Default schema for the schema-agnostic shared engine entities (event
        # admin viewers etc.). This module's own entities hardcode
        # @Table(schema="demo"), so they're unaffected; this only resolves the
        # unqualified engine entities to this module's schema.
        default_schema: ${APP_SCHEMA:demo}
  flyway:
    enabled: true
    baseline-on-migrate: true
    # Engine migrations use a reserved high band (V9000+) and get applied ahead
    # of new module migrations, so a later module migration arrives "out of
    # order" on an already-upgraded DB. The two streams are independent, so
    # allow it. Also lets new timestamp-versioned migrations interleave with the
    # legacy V1-V22 band.
    out-of-order: true
    # Pin the history table to public. The app schema (`demo`) now matches the DB
    # role name, so postgres `search_path` ("$user", public) resolves "$user" ->
    # the demo schema and would otherwise flip Flyway's default schema there,
    # orphaning the real history in public and re-baselining + replaying old
    # migrations that still reference the pre-rename schema.
    default-schema: public
    # Engine-owned migrations (event_outbox / event_inbox / … V9000+) ship in
    # the csnx-engine-spring jar at classpath:db/engine; the ${appSchema}
    # placeholder lands them in this module's own schema. Needed for the
    # inter-module event consumer below. See docs/inter-module-integration.md.
    locations: classpath:db/migration,classpath:db/engine
    placeholders:
      appSchema: ${APP_SCHEMA:demo}
  # RabbitMQ — broker for inter-module events (Spring Cloud Stream rabbit
  # binder). DEMO has no broker of its own; the compose stack reaches the
  # platform stack's broker via host.docker.internal.
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  cloud:
    stream:
      bindings:
        # DEMO's inbound integration events — one Consumer bean
        # (DemoEventConsumers.integrationEvents) dispatches by event type:
        # pom.vendor.changed -> demo.int_vendor and platform.company.changed ->
        # demo.int_company (both WAL CDC, configured on the platform CDCC screen).
        # A single functional bean is auto-detected (set
        # spring.cloud.function.definition explicitly if a second is ever added).
        integrationEvents-in-0:
          destination: csnx.events
          group: demo               # durable, competing-consumer safe
  # Spring AI — chat autoconfig is OFF by default (none) so the starter can sit
  # on the classpath without affecting boot. Set spring.ai.model.chat=google-genai
  # (env SPRING_AI_MODEL_CHAT) together with csnx.engine.ai.llm.provider=google-genai to use it.
  ai:
    # Don't retry LLM failures. A 429 from the free-tier daily quota can't be
    # retried away — retrying only delays the honest "busy, try again" message
    # AND burns more of the daily request budget. Fail fast on the first attempt.
    retry:
      max-attempts: 1
    model:
      chat: ${SPRING_AI_MODEL_CHAT:none}
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: ${LLM_MODEL:gemini-2.5-flash-lite}
            temperature: 0.0

server:
  # Demo's own host port so it coexists with POM (8080) + platform (8090)
  # during local dev. In the container SERVER_PORT is overridden back to
  # 8080 (the nginx upstream default) and the host maps 8092:8080.
  port: ${SERVER_PORT:8092}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

management:
  health:
    # The event broker is a soft dependency — the inbox consumer just pauses
    # while RabbitMQ is unreachable, so don't let it drag the module DOWN
    # (which would also break broker-less standalone/test runs).
    rabbit:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

app:
  security:
    cors:
      allowed-origins:
        - http://localhost:5175
        - http://localhost:8082
    # Platform IdP this module relies on — sign-in happens on its central
    # login page; RS256 access tokens (validated via JWKS) are the only
    # credential this module accepts.
    platform:
      issuer: ${PLATFORM_ISSUER:http://localhost:8090}
      jwks-uri: ${PLATFORM_JWKS_URI:}   # blank → <issuer>/oauth2/jwks
      audience: demo-module

# This module's code in the central metadata store (P4).
csnx:
  # TEMP test-services gate — activates TestCallController (/api/test/call) so
  # DEMO can fire a Channel-1 call to platform for end-to-end logging demos.
  # Delete after sign-off (with TestCallController + the /api/test/** permits).
  test-services:
    enabled: ${TEST_SERVICES_ENABLED:true}
  module:
    code: DEMO
    # Header version label (shown next to the module switcher). Not the module code.
    version: ${MODULE_VERSION:1.0}
  # Inter-module events — DEMO subscribes to pom.vendor.changed (WAL CDC from
  # pom's vendor master) and mirrors it into demo.int_vendor. Activated by the
  # rabbit binder on the classpath. See docs/inter-module-integration.md and
  # docs/cdc-vendor-pom-to-demo.md (platform repo).
  events:
    # Off by default so test slices and broker-less standalone runs are
    # unaffected; turned on per-environment (compose sets CSNX_EVENTS_ENABLED).
    enabled: ${CSNX_EVENTS_ENABLED:false}
    schema: ${APP_SCHEMA:demo}
    destination: csnx.events
    # Register the read-only event admin viewers (outbox/inbox/error log
    # activities) so the platform's Integration Trace can read this module's
    # ledgers over Channel 1. CRUD/read only — safe with or without the broker.
    admin:
      enabled: ${CSNX_EVENTS_ADMIN_ENABLED:true}
  engine:
    registry:
      # Register this module's screens/menus/lookups into the platform's
      # central metadata store on boot and read them back. The classpath
      # manifest is always the offline fallback, so a down platform never
      # breaks reads.
      enabled: ${CSNX_REGISTRY_ENABLED:true}
      module-code: DEMO
      platform-base-url: ${PLATFORM_REGISTRY_URL:http://localhost:8090}
      client-id: demo-service
      client-secret: ${DEMO_SERVICE_SECRET:demo-service-dev-secret}
      engine-version: 0.1.1
      # Re-fetch the stored manifest from the central store this often so live
      # DB screen edits (DB-source-of-truth) appear without a restart. Low for
      # snappy edit-and-see; POST /api/metadata/reload forces it immediately.
      refresh-seconds: ${CSNX_REGISTRY_REFRESH_SECONDS:5}
    # Inter-module callee (Channel 1): accept service-token process calls from
    # other modules on /api/service/process — JWKS + scope module.process via the
    # engine's ServiceProcessSecurityConfig. Off by default (opt-in auth
    # surface). See docs/inter-module-integration.md Channel 1.
    service-process:
      enabled: ${CSNX_SERVICE_PROCESS_ENABLED:false}
      jwks-uri: ${PLATFORM_JWKS_URI:${PLATFORM_ISSUER:http://localhost:8090}/oauth2/jwks}
    # Service Call Log (SCLG) — record inbound + outbound service calls into
    # demo.service_call_log; admin-enabled surfaces the integration.callLog viewer.
    call-log:
      enabled: ${CSNX_CALL_LOG_ENABLED:true}
      schema: ${APP_SCHEMA:demo}
      max-payload-chars: ${CSNX_CALL_LOG_MAX_PAYLOAD_CHARS:32768}
      display-payload-chars: ${CSNX_CALL_LOG_DISPLAY_PAYLOAD_CHARS:1000}
      retention-days: ${CSNX_CALL_LOG_RETENTION_DAYS:30}
      admin-enabled: ${CSNX_CALL_LOG_ADMIN_ENABLED:true}
      retry:
        enabled: ${CSNX_CALL_LOG_RETRY_ENABLED:true}
        poll-ms: ${CSNX_CALL_LOG_RETRY_POLL_MS:10000}
        batch-size: 10
        stale-processing-minutes: 5
    # Per-service registry (SVCF) — opt-in logging (only services with a
    # matching, log-enabled service_config row are recorded).
    service-config:
      enabled: ${CSNX_SERVICE_CONFIG_ENABLED:true}
      schema: ${APP_SCHEMA:demo}
      cache-ttl-ms: ${CSNX_SERVICE_CONFIG_CACHE_TTL_MS:30000}
      admin-enabled: ${CSNX_SERVICE_CONFIG_ADMIN_ENABLED:true}
      log-unconfigured: ${CSNX_SERVICE_CONFIG_LOG_UNCONFIGURED:false}
    # Outbound Channel 1 client (caller) — needed by global-settings below.
    service-client:
      enabled: ${CSNX_SERVICE_CLIENT_ENABLED:false}
      platform-base-url: ${PLATFORM_ISSUER:http://localhost:8090}
      target-base-url: ${SERVICE_TARGET_URL:}
      client-id: demo-service
      client-secret: ${DEMO_SERVICE_SECRET:demo-service-dev-secret}
    # WAL CDC producer (WalCdcPoller). Demo captures its OWN tables named in
    # int_cdc_config (module_cd=DEMO, e.g. demo.scwt_trader) off a logical slot
    # (csnx_cdc_demo) into the outbox. The config set is fetched from the PLATFORM
    # over Channel 1 (service-client above; the Docker URL-split env in compose
    # points the token mint + config fetch at the platform stack). Needs
    # wal_level=logical on postgres + csnx.events (enabled above). schema = where
    # int_cdc_state lands.
    cdc:
      enabled: ${CSNX_ENGINE_CDC_ENABLED:false}
      schema: ${APP_SCHEMA:demo}
    # Track the platform's global settings (search limit) — fetch over Channel 1
    # on boot + refresh. Off by default; requires service-client.enabled=true.
    global-settings:
      enabled: ${CSNX_GLOBAL_SETTINGS_ENABLED:false}
      company: ${CSNX_GLOBAL_SETTINGS_COMPANY:WCS}
      refresh-ms: ${CSNX_GLOBAL_SETTINGS_REFRESH_MS:300000}
    # Smart-navigation assistant LLM (shared AI engine). Provider swappable;
    # key via env (GEMINI_API_KEY). No key → the assistant replies it isn't
    # configured rather than failing.
    ai:
      llm:
        provider: ${LLM_PROVIDER:gemini}
        model: ${LLM_MODEL:gemini-2.5-flash-lite}
        api-key: ${GEMINI_API_KEY:}
        timeout: PT20S
      query-log:
        enabled: ${ASSISTANT_QUERY_LOG_ENABLED:false}
