# One compose file for every environment. Everything that differs between
# local / test / preprod / prod lives in a per-environment .env file
# (.env.local, .env.test, .env.preprod, .env.prod) — the images are identical.
#
#   local  :  ./scripts/stack.ps1 -Action up                 # built-in defaults == .env.local
#             ./scripts/stack.ps1 -Action up -Environment local
#   others :  docker compose --env-file .env.test    up -d
#             docker compose --env-file .env.preprod up -d
#             docker compose --env-file .env.prod    up -d
#
# Every ${VAR:-default} falls back to the local-dev value, so plain
# `docker compose up` (no --env-file) behaves exactly like the old dev stack.
# Demo has no broker of its own: it reaches the platform's IdP + central
# metadata registry on the host (host.docker.internal) — start the platform
# stack first. See .env.example for the full list of knobs.

services:
  postgres:
    # Debian postgres + wal2json (3-line Dockerfile) for the engine's WAL CDC;
    # wal_level=logical activates logical decoding so demo can be a CDC producer
    # of its own tables (e.g. demo.scwt_trader). ⚠ Switching from the old
    # postgres:16-alpine changes libc collation — the postgres-data volume must
    # be recreated ONCE on upgrade (docker volume rm demo_postgres-data after
    # `down`; Flyway migrations + seeds rebuild the dev DB on next boot).
    build:
      context: ./infra/postgres-wal2json
    image: ${DEMO_DB_IMAGE:-demo-postgres-wal2json:16}
    command: postgres -c wal_level=logical
    environment:
      POSTGRES_DB: ${DEMO_DB_NAME:-demo}
      POSTGRES_USER: ${DEMO_DB_USER:-demo}
      POSTGRES_PASSWORD: ${DEMO_DB_PASSWORD:-demo}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEMO_DB_USER:-demo} -d ${DEMO_DB_NAME:-demo}"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      # Demo's own host port, distinct from every module (POM 5432, platform
      # 5433, vendor-portal 5434, controltower 5436). Demo is the throwaway
      # module, so on any clash demo moves — never a real module.
      # Full publish spec so prod can bind localhost only, e.g. 127.0.0.1:5435:5432
      - "${DEMO_DB_PUBLISH:-5435:5432}"

  backend:
    # build + image: on a laptop `up --build` compiles the tag from source;
    # on test/preprod/prod hosts the SAME tag is loaded via `docker load` and
    # the build section is never exercised (no source/build context needed).
    # The backend Dockerfile COPYs a prebuilt target/*.jar — run `mvnw package`
    # (or scripts/redeploy.ps1) before building the image locally.
    build:
      context: ./backend
    image: ${DEMO_BACKEND_IMAGE:-demo-backend:latest}
    environment:
      # Default to dev so dev endpoints + verbose SQL logging are on.
      # Override for prod-like local: SPRING_PROFILES_ACTIVE=prod docker compose up
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      # Keep the container's internal port at 8080 (the nginx upstream default);
      # the host maps 8092:8080 so demo's backend coexists with POM (8080).
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${DEMO_DB_NAME:-demo}
      DB_USER: ${DEMO_DB_USER:-demo}
      DB_PASSWORD: ${DEMO_DB_PASSWORD:-demo}
      # Smart-navigation assistant — Gemini API key. Supplied from the host
      # environment or an untracked .env file (docker compose auto-reads .env);
      # never hardcode the key here. When unset the assistant replies that it
      # isn't configured rather than failing.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LLM_PROVIDER: ${APP_LLM_PROVIDER:-gemini}
      # Spring AI chat autoconfig stays OFF (none) for a keyless boot. To enable
      # the assistant, set all three together in .env: GEMINI_API_KEY,
      # APP_LLM_PROVIDER=google-genai, SPRING_AI_MODEL_CHAT=google-genai.
      SPRING_AI_MODEL_CHAT: ${SPRING_AI_MODEL_CHAT:-none}
      # Platform IdP (relying-party SSO). The issuer is the browser-visible
      # URL (token `iss` claim must match), but JWKS is fetched server-side
      # from inside this container — host.docker.internal reaches the
      # platform compose stack on the host.
      PLATFORM_ISSUER: ${PLATFORM_ISSUER:-http://localhost:8090}
      PLATFORM_JWKS_URI: ${PLATFORM_JWKS_URI:-http://host.docker.internal:8090/oauth2/jwks}
      # Central metadata registry (P4): the registrar runs server-side, so it
      # reaches the platform via host.docker.internal. The client-credentials
      # secret must match the demo-service hash registered on the platform.
      PLATFORM_REGISTRY_URL: ${PLATFORM_REGISTRY_URL:-http://host.docker.internal:8090}
      DEMO_SERVICE_SECRET: ${DEMO_SERVICE_SECRET:-demo-service-dev-secret}
      # Inter-module events (Spring Cloud Stream rabbit binder): DEMO consumes
      # pom.vendor.changed → demo.int_vendor. The broker lives in the platform
      # stack — start it first. See docs/inter-module-integration.md.
      CSNX_EVENTS_ENABLED: "${CSNX_EVENTS_ENABLED:-true}"
      RABBITMQ_HOST: ${RABBITMQ_HOST:-host.docker.internal}
      # Become a Channel-1 callee so the platform's Integration Trace can read
      # this module's event ledgers (outbox/inbox/error viewers) over
      # /api/service/process (JWKS-validated platform token, scope module.process).
      CSNX_SERVICE_PROCESS_ENABLED: "${CSNX_SERVICE_PROCESS_ENABLED:-true}"
      # WAL CDC producer: demo captures its own tables (e.g. demo.scwt_trader)
      # off a logical slot (csnx_cdc_demo) into the outbox. Its CDC config set is
      # fetched from the PLATFORM over Channel 1 (int_cdc_config, module_cd=DEMO),
      # so demo needs the outbound service client + the Docker URL split (token
      # mint + config fetch both target the platform stack on the host). Needs
      # wal_level=logical on postgres (set above) + csnx.events (on above).
      CSNX_ENGINE_CDC_ENABLED: "${CSNX_ENGINE_CDC_ENABLED:-true}"
      CSNX_SERVICE_CLIENT_ENABLED: "${CSNX_SERVICE_CLIENT_ENABLED:-true}"
      SERVICE_TARGET_URL: ${SERVICE_TARGET_URL:-http://host.docker.internal:8090}
      CSNX_ENGINE_SERVICE_CLIENT_PLATFORM_BASE_URL: ${CSNX_ENGINE_SERVICE_CLIENT_PLATFORM_BASE_URL:-http://host.docker.internal:8090}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${DEMO_BACKEND_PUBLISH:-8092:8080}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  frontend:
    build:
      context: ./frontend
      # GitHub Packages read token for the frontend's `npm ci` (the engine is
      # pulled from the registry, not a vendored tgz). scripts/redeploy.ps1
      # writes .secrets/gh_token from GH_PACKAGES_TOKEN before the build;
      # file-based because env-sourced build secrets need compose >= 2.23.
      secrets:
        - gh_token
    image: ${DEMO_FRONTEND_IMAGE:-demo-frontend:latest}
    environment:
      # Browser-facing platform URLs (IdP + central portal), rendered into
      # config.js at container start — changing them needs no image rebuild.
      PLATFORM_ISSUER: ${PLATFORM_ISSUER:-http://localhost:8090}
      PORTAL_URL: ${PORTAL_URL:-http://localhost:8091}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # Demo's own host port, distinct from every module (POM 8081, platform
      # 8091, controltower 8084, vendor-portal frontend 8083 / backend 8082).
      # Demo moved off 8082 to leave it to vendor-portal's backend.
      - "${DEMO_FRONTEND_PUBLISH:-8085:80}"

volumes:
  postgres-data:

secrets:
  gh_token:
    file: .secrets/gh_token
