services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      # Demo's own host port so it coexists with POM (5432) + platform (5433).
      - "5434:5432"

  backend:
    build:
      context: ./backend
    environment:
      # Default to dev so dev endpoints + verbose SQL logging are on.
      # Override for prod-like local: SPRING_PROFILES_ACTIVE=prod docker compose up
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      # Keep the container's internal port at 8080 (the nginx upstream default);
      # the host maps 8092:8080 so demo's backend coexists with POM (8080).
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/demo
      DB_USER: demo
      DB_PASSWORD: demo
      # Smart-navigation assistant — Gemini API key. Supplied from the host
      # environment or an untracked .env file (docker compose auto-reads .env);
      # never hardcode the key here. When unset the assistant replies that it
      # isn't configured rather than failing.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LLM_PROVIDER: ${APP_LLM_PROVIDER:-gemini}
      # Spring AI chat autoconfig stays OFF (none) for a keyless boot. To enable
      # the assistant, set all three together in .env: GEMINI_API_KEY,
      # APP_LLM_PROVIDER=google-genai, SPRING_AI_MODEL_CHAT=google-genai.
      SPRING_AI_MODEL_CHAT: ${SPRING_AI_MODEL_CHAT:-none}
      # Platform IdP (relying-party SSO). The issuer is the browser-visible
      # URL (token `iss` claim must match), but JWKS is fetched server-side
      # from inside this container — host.docker.internal reaches the
      # platform compose stack on the host.
      PLATFORM_ISSUER: ${PLATFORM_ISSUER:-http://localhost:8090}
      PLATFORM_JWKS_URI: ${PLATFORM_JWKS_URI:-http://host.docker.internal:8090/oauth2/jwks}
      # Central metadata registry (P4): the registrar runs server-side, so it
      # reaches the platform via host.docker.internal. The client-credentials
      # secret must match the demo-service hash registered on the platform.
      PLATFORM_REGISTRY_URL: ${PLATFORM_REGISTRY_URL:-http://host.docker.internal:8090}
      DEMO_SERVICE_SECRET: ${DEMO_SERVICE_SECRET:-demo-service-dev-secret}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8092:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # Demo's own host port so it coexists with POM (8081) + platform (8091).
      - "8082:80"

volumes:
  postgres-data:
